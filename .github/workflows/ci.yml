name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel in-progress runs for the same ref when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit + typecheck + lint ──────────────────────────────────────────────
  # The core gate: fast (~1 min), no external services needed. This is what
  # must stay green on every push.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Billing tested in no-keys mode (the open-source / self-host path).
      # Striped empty so the zod schema's .optional() allows them through.
      STRIPE_SECRET_KEY: ""
      STRIPE_TEAM_PRICE_ID: ""
      STRIPE_BUSINESS_PRICE_ID: ""
      STRIPE_PRO_PRICE_ID: ""
      STRIPE_WEBHOOK_SECRET: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Custom legal-compliance ESLint rules
        run: node tools/eslint-rules/run-tests.mjs

      - name: Unit + integration tests
        run: npm test

  # ── End-to-end (Playwright) ──────────────────────────────────────────────
  # Boots a local Supabase stack + the app, then runs the Playwright suite.
  # Allowed to fail without blocking merges (continue-on-error) while the
  # Supabase service setup is being stabilized.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true

    env:
      STRIPE_SECRET_KEY: ""
      STRIPE_TEAM_PRICE_ID: ""
      STRIPE_BUSINESS_PRICE_ID: ""
      STRIPE_PRO_PRICE_ID: ""
      STRIPE_WEBHOOK_SECRET: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Local Supabase stack — the E2E tests use the well-known local demo
      # keys (127.0.0.1:54321). supabase CLI boots the full Docker stack.
      - name: Setup Supabase
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Apply migrations
        run: supabase db push

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
